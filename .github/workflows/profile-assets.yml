name: Update Profile Assets

on:
  schedule:
    - cron: "0 */6 * * *"   # refreshes every 6 hours
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  # Job 1: contribution snake + cached stats/streak/top-langs/activity cards
  snake-and-cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: Ronak-webdev
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: Cache GitHub Stats / Top Langs / Streak / Activity Graph
        run: |
          mkdir -p dist
          curl -fsSL "https://github-readme-stats.vercel.app/api?username=Ronak-webdev&show_icons=true&hide_border=true&border_radius=12&bg_color=FFFFFF&title_color=7C3AED&icon_color=8B5CF6&text_color=24292E&count_private=true" -o dist/stats-light.svg
          curl -fsSL "https://github-readme-stats.vercel.app/api?username=Ronak-webdev&show_icons=true&hide_border=true&border_radius=12&bg_color=0D1117&title_color=A855F7&icon_color=8B5CF6&text_color=C9D1D9&count_private=true" -o dist/stats-dark.svg
          curl -fsSL "https://github-readme-stats.vercel.app/api/top-langs/?username=Ronak-webdev&layout=compact&hide_border=true&border_radius=12&bg_color=FFFFFF&title_color=7C3AED&text_color=24292E" -o dist/langs-light.svg
          curl -fsSL "https://github-readme-stats.vercel.app/api/top-langs/?username=Ronak-webdev&layout=compact&hide_border=true&border_radius=12&bg_color=0D1117&title_color=A855F7&text_color=C9D1D9" -o dist/langs-dark.svg
          curl -fsSL "https://streak-stats.demolab.com/?user=Ronak-webdev&hide_border=true&border_radius=12&background=FFFFFF&ring=7C3AED&fire=8B5CF6&currStreakLabel=7C3AED&sideLabels=24292E&currStreakNum=111111&sideNums=24292E&dates=6A737D&border=E1E4E8" -o dist/streak-light.svg
          curl -fsSL "https://streak-stats.demolab.com/?user=Ronak-webdev&hide_border=true&border_radius=12&background=0D1117&ring=A855F7&fire=8B5CF6&currStreakLabel=A855F7&sideLabels=C9D1D9&currStreakNum=FFFFFF&sideNums=C9D1D9&dates=8B949E" -o dist/streak-dark.svg
          curl -fsSL "https://github-readme-activity-graph.vercel.app/graph?username=Ronak-webdev&bg_color=ffffff&color=7C3AED&line=7C3AED&point=4A00E0&area=true&hide_border=true" -o dist/activity-light.svg
          curl -fsSL "https://github-readme-activity-graph.vercel.app/graph?username=Ronak-webdev&bg_color=0D1117&color=A855F7&line=A855F7&point=8B5CF6&area=true&hide_border=true" -o dist/activity-dark.svg

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 2: animated 3D contribution calendar
  contrib-3d:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Ronak-webdev

      - name: Publish to output-3d-contrib branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output-3d-contrib
          build_dir: profile-3d-contrib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
